name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: build-placeholder
          SUPABASE_SERVICE_ROLE_KEY: build-placeholder
          NEXT_PUBLIC_APP_URL: https://example.com

  smoke-tests:
    runs-on: ubuntu-latest
    needs: build-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Wait for deploy to settle
        run: sleep 60

      - name: Run smoke tests against production
        run: |
          set -euo pipefail
          RESPONSE=$(curl -sS --max-time 120 -X POST "${APP_URL}/api/admin/tests/ci" \
            -H "Authorization: Bearer ${CI_TEST_SECRET}" \
            -H "Content-Type: application/json")
          echo "$RESPONSE" | tee smoke-result.json
          FAILED=$(echo "$RESPONSE" | jq -r '.failed // "error"')
          if [ "$FAILED" = "error" ]; then
            echo "::error::Smoke endpoint did not return JSON"
            exit 1
          fi
          if [ "$FAILED" != "0" ]; then
            echo "::error::Smoke tests failed: $FAILED failure(s)"
            echo "$RESPONSE" | jq -r '.results[] | select(.status=="failed") | "  - [\(.category)] \(.name): \(.message // "no message")"'
            exit 1
          fi
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CI_TEST_SECRET: ${{ secrets.CI_TEST_SECRET }}
